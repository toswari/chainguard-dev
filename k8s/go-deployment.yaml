apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-hello-server
  labels:
    app: go-hello-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-hello-server
  template:
    metadata:
      labels:
        app: go-hello-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
      - name: hello-server
        image: localhost:5000/go-multi-patched:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true